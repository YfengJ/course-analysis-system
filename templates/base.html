<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or system_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page-shell">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <header class="site-header">
        <div class="container-xxl">
            <div class="header-bar">
                <a class="brand-mark" href="{{ url_for('dashboard.index') }}">
                    <span class="brand-badge" aria-hidden="true">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="29" width="6" height="11" rx="2.4" fill="currentColor"/>
                            <rect x="18" y="21" width="6" height="19" rx="2.4" fill="currentColor"/>
                            <rect x="28" y="14" width="6" height="26" rx="2.4" fill="currentColor"/>
                            <path d="M10.5 17.5C15.2 13.1 20 11.3 24.9 12.2C28.2 12.8 31 14.4 34 14.5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <circle cx="34.5" cy="14.5" r="3.2" fill="#FFD36A"/>
                        </svg>
                    </span>
                    <span>
                        <strong>{{ system_name }}</strong>
                    </span>
                </a>
                <nav class="main-nav">
                    <a class="{{ 'active' if request.endpoint == 'dashboard.index' else '' }}" href="{{ url_for('dashboard.index') }}">课程工作台</a>
                    <a class="{{ 'active' if request.endpoint == 'course.index' else '' }}" href="{{ url_for('course.index') }}">课程列表</a>
                    <a class="{{ 'active' if request.endpoint == 'report_center.index' else '' }}" href="{{ url_for('report_center.index') }}">报告中心</a>
                    <a class="{{ 'active' if request.endpoint == 'guide.index' else '' }}" href="{{ url_for('guide.index') }}">系统使用说明</a>
                </nav>
                <a class="quick-create" href="{{ url_for('course.create_course') }}">开始建课</a>
            </div>
        </div>
    </header>

    <main class="page-main">
        <div class="container-xxl py-4 py-lg-5">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-4">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} border-0 shadow-sm rounded-4" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
